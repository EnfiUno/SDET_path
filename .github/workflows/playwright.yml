name: Playwright API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run the full suite every night at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    env:
      # These values come from GitHub repository secrets and variables.
      # To set them: GitHub repo → Settings → Secrets and variables → Actions
      API_URL: ${{ vars.API_URL }}
      BOOKER_USERNAME: ${{ secrets.BOOKER_USERNAME }}
      BOOKER_PASSWORD: ${{ secrets.BOOKER_PASSWORD }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run smoke tests first — fast check that the API is alive
      - name: Run smoke tests
        run: npx playwright test --grep @smoke

      # Run the full suite after smoke passes
      - name: Run full test suite
        run: npx playwright test

      # Upload the HTML report so it can be downloaded from the Actions run
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
